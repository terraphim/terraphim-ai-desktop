name: Comprehensive Release

on:
  push:
    tags:
      - 'v*'
      - 'terraphim-ai-desktop-v*'
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'Trigger source (e.g., terraphim-ai-release)'
        required: false
        type: string
      source_tag:
        description: 'Source tag from terraphim-ai'
        required: false
        type: string
      test_run:
        description: 'Test run without creating release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-versions:
    name: Verify version consistency
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version from tag
        id: extract
        run: |
          # Get the tag name
          TAG="${{ github.ref_name }}"
          echo "Tag: $TAG"

          # Extract version (strip v prefix and any component prefix)
          if [[ "$TAG" == *"-v"* ]]; then
            # Component-specific tag like terraphim_agent-v1.5.2
            VERSION="${TAG##*-v}"
          elif [[ "$TAG" == v* ]]; then
            # Standard version tag like v1.5.2
            VERSION="${TAG#v}"
          else
            echo "::error::Invalid tag format: $TAG (expected v* or component-v*)"
            exit 1
          fi

          echo "Extracted version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify Cargo.toml versions match tag
        env:
          EXPECTED_VERSION: ${{ steps.extract.outputs.version }}
        run: |
          echo "Expected version: $EXPECTED_VERSION"

          # Get desktop package version (only package in this repo)
          DESKTOP_VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "terraphim-ai-desktop") | .version')
          echo "Desktop package version: $DESKTOP_VERSION"

          if [ "$DESKTOP_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::Version mismatch for terraphim-ai-desktop: expected $EXPECTED_VERSION, got $DESKTOP_VERSION"
            echo ""
            echo "::error::Version verification failed! Update package version in desktop/src-tauri/Cargo.toml to match the release tag."
            exit 1
          fi

          echo "All versions match expected: $EXPECTED_VERSION"

  # Note: Server/agent binaries are built in terraphim-ai repo
  # This workflow only builds the desktop app

  build-debian-packages:
    name: Build Debian packages
    needs: verify-versions
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js (for frontend assets)
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: desktop/yarn.lock

      - name: Build frontend assets
        working-directory: ./desktop
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Build Debian packages
        run: |
          # Build desktop package (uses git dependencies from terraphim-ai)
          cargo deb -p terraphim-ai-desktop --output target/debian/

      - name: Upload Debian packages
        uses: actions/upload-artifact@v5
        with:
          name: debian-packages
          path: target/debian/*.deb

  build-tauri-desktop:
    name: Build Tauri desktop app for ${{ matrix.platform }}
    needs: verify-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            webkit-package: ""
            javascriptcore-package: ""
          - platform: ubuntu-22.04
            webkit-package: "libwebkit2gtk-4.0-dev"
            javascriptcore-package: "libjavascriptcoregtk-4.0-dev"
          # NOTE: Ubuntu 24.04 removed - Tauri v1 requires webkit 4.0, but 24.04 only has 4.1
          - platform: windows-latest
            webkit-package: ""
            javascriptcore-package: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: desktop/yarn.lock

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install system dependencies (Ubuntu)
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          # Tauri v1 requires webkit 4.0 - install from matrix variables
          sudo apt-get install -yqq --no-install-recommends \
            ${{ matrix.webkit-package }} ${{ matrix.javascriptcore-package }} \
            libgtk-3-dev libsoup2.4-dev libayatana-appindicator3-dev librsvg2-dev pkg-config

      - name: Install frontend dependencies
        working-directory: ./desktop
        run: yarn install --frozen-lockfile

      - name: Build frontend assets
        working-directory: ./desktop
        run: yarn build

      - name: Install 1Password CLI (macOS/Linux)
        if: runner.os != 'Windows'
        uses: 1password/install-cli-action@v2

      - name: Load Tauri signing key from 1Password (macOS/Linux)
        if: runner.os != 'Windows'
        id: tauri-key
        continue-on-error: true
        shell: bash
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          if [ -n "$OP_SERVICE_ACCOUNT_TOKEN" ]; then
            TAURI_KEY=$(op read "op://TerraphimPlatform/tauri-signing-key/private-key" 2>/dev/null || echo "")
            if [ -n "$TAURI_KEY" ]; then
              echo "TAURI_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
              echo "$TAURI_KEY" >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
              echo "has_key=true" >> $GITHUB_OUTPUT
              echo "Tauri signing key loaded successfully"
            else
              echo "has_key=false" >> $GITHUB_OUTPUT
              echo "Tauri signing key not found in 1Password"
            fi
          else
            echo "has_key=false" >> $GITHUB_OUTPUT
            echo "No 1Password token available"
          fi

      - name: Disable updater if no signing key
        if: steps.tauri-key.outputs.has_key != 'true'
        shell: bash
        working-directory: ./desktop/src-tauri
        run: |
          echo "Disabling Tauri updater (no signing key available)"
          # Remove pubkey to disable updater signing requirement
          if command -v jq &> /dev/null; then
            jq '.tauri.updater.active = false | del(.tauri.updater.pubkey)' tauri.conf.json > tauri.conf.json.tmp
            mv tauri.conf.json.tmp tauri.conf.json
          else
            # Fallback: use sed to disable updater
            if [[ "$OSTYPE" == "darwin"* ]]; then
              sed -i '' 's/"active": true/"active": false/' tauri.conf.json
            else
              sed -i 's/"active": true/"active": false/' tauri.conf.json
            fi
          fi
          echo "Updater disabled in tauri.conf.json"

      - name: Build Tauri app
        working-directory: ./desktop
        shell: bash
        run: yarn tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ env.TAURI_PRIVATE_KEY }}

      - name: Upload desktop artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v5
        with:
          name: desktop-macos
          path: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/macos/*.app

      - name: Upload desktop artifacts (Linux)
        if: startsWith(matrix.platform, 'ubuntu-')
        uses: actions/upload-artifact@v5
        with:
          name: desktop-linux-${{ matrix.platform }}
          path: |
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/deb/*.deb

      - name: Upload desktop artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v5
        with:
          name: desktop-windows
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe

  # Note: Docker images are built in terraphim-ai repo

  create-release:
    name: Create GitHub release
    needs: [build-debian-packages, build-tauri-desktop]
    # Run even if some jobs failed - release whatever was built successfully
    if: always() && (needs.build-debian-packages.result == 'success' || needs.build-tauri-desktop.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          # Copy binary artifacts - look for specific binary names since -executable
          # doesn't work for cross-platform binaries downloaded as artifacts
          for artifact_dir in binaries-*; do
            if [ -d "$artifact_dir" ]; then
              echo "Processing $artifact_dir..."
              # Copy archive files (tar.gz, zip) for auto-update compatibility
              find "$artifact_dir" -type f \( -name "*.tar.gz" -o -name "*.zip" \) | while read file; do
                echo "  Copying archive: $file"
                cp "$file" release-assets/
              done
              # Copy raw binaries for backward compatibility
              find "$artifact_dir" -type f \( -name "terraphim*" -o -name "*.exe" \) | while read file; do
                echo "  Copying binary: $file"
                cp "$file" release-assets/
              done
            fi
          done

          # Copy Debian packages
          if [ -d "debian-packages" ]; then
            find debian-packages -name "*.deb" -type f | while read file; do
              cp "$file" release-assets/
            done
          fi

          # Copy desktop artifacts
          for artifact_dir in desktop-*; do
            if [ -d "$artifact_dir" ]; then
              find "$artifact_dir" -type f \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" \) | while read file; do
                cp "$file" release-assets/
              done
            fi
          done

          # List all assets
          echo "Release assets:"
          ls -la release-assets/

      - name: Generate checksums
        working-directory: release-assets
        run: |
          sha256sum * > checksums.txt

      - name: Extract release notes from tag
        id: release-notes
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            echo "Creating release for tag: $TAG"

            # Extract component and version from tag
            if [[ "$TAG" == *"-v"* ]]; then
              COMPONENT=${TAG%-v*}
              VERSION=${TAG##*-v}
              echo "Component: $COMPONENT, Version: $VERSION"
              TITLE="$COMPONENT v$VERSION"
            else
              TITLE="$TAG"
            fi

            echo "title=$TITLE" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release-notes.outputs.title }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: release-assets/*
          body: |
            ## Terraphim AI Desktop Release

            This is the desktop application release. Server and CLI binaries are available in the [terraphim-ai](https://github.com/terraphim/terraphim-ai) repository.

            ## Release Assets

            ### Desktop Applications
            - `*.dmg`: macOS desktop installer
            - `*.AppImage`: Linux portable desktop app
            - `*.msi`, `*.exe`: Windows desktop installers
            - `*.deb`: Debian/Ubuntu desktop package

            ### Server Components
            Server binaries, CLI tools, and Docker images are available from the [terraphim-ai releases](https://github.com/terraphim/terraphim-ai/releases).

            ### Installation

            #### macOS
            Download and open the `.dmg` file, then drag Terraphim AI to your Applications folder.

            #### Linux
            **AppImage:** Download, make executable (`chmod +x *.AppImage`), and run.
            **Debian/Ubuntu:** Install with `sudo dpkg -i terraphim-ai-desktop_*.deb`

            #### Windows
            Download and run the `.msi` or `.exe` installer.

            See `checksums.txt` for file integrity verification.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Note: Homebrew formulas are updated by terraphim-ai repo
  # Note: Crates are published by terraphim-ai repo
